{% raw %}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - CrewAI Stock</title>
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            background: white;
            border-radius: 20px;
            padding: 50px 60px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 450px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .login-header h1 {
            font-size: 32px;
            color: #303133;
            margin-bottom: 10px;
        }

        .login-header p {
            font-size: 14px;
            color: #909399;
        }

        .login-form {
            margin-top: 30px;
        }

        .form-item {
            margin-bottom: 25px;
        }

        .form-item label {
            display: block;
            font-size: 14px;
            color: #606266;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-item input {
            width: 100%;
            height: 48px;
            padding: 0 15px;
            border: 2px solid #DCDFE6;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.3s;
        }

        .form-item input:focus {
            outline: none;
            border-color: #409EFF;
        }

        .login-btn {
            width: 100%;
            height: 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .tips {
            margin-top: 20px;
            padding: 15px;
            background: #f4f4f5;
            border-radius: 8px;
            font-size: 13px;
            color: #606266;
            line-height: 1.6;
        }

        .tips strong {
            color: #303133;
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="login-container">
            <div class="login-header">
                <h1>🤖 CrewAI Stock</h1>
                <p>AI驱动的智能交易系统</p>
            </div>

            <div class="login-form">
                <div class="form-item">
                    <label>请输入您的用户名</label>
                    <input 
                        v-model="username" 
                        type="text" 
                        placeholder="例如：张三、user001"
                        @keyup.enter="handleLogin"
                        maxlength="20"
                        autofocus
                    >
                </div>

                <button class="login-btn" @click="handleLogin" :disabled="loading">
                    {{ loading ? '登录中...' : '进入系统' }}
                </button>

                <div class="tips">
                    <strong>💡 提示：</strong><br>
                    • 用户名将作为您的唯一标识<br>
                    • 支持中文、英文、数字、下划线<br>
                    • 长度不超过20个字符<br>
                    • 30天内无需重复输入
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/element-plus"></script>
    <script>
        const { createApp } = Vue;
        const { ElMessage } = ElementPlus;

        createApp({
            data() {
                return {
                    username: '',
                    loading: false
                }
            },
            methods: {
                async handleLogin() {
                    if (!this.username.trim()) {
                        ElMessage.error('请输入用户名');
                        return;
                    }

                    this.loading = true;

                    try {
                        const response = await fetch('/api/login', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({
                                username: this.username.trim()
                            })
                        });

                        const data = await response.json();

                        if (data.success) {
                            ElMessage.success(`欢迎，${data.username}！`);
                            setTimeout(() => {
                                // Check for 'next' parameter
                                const urlParams = new URLSearchParams(window.location.search);
                                const nextUrl = urlParams.get('next');
                                if (nextUrl) {
                                    window.location.href = nextUrl;
                                } else {
                                    window.location.href = '/trading';
                                }
                            }, 500);
                        } else {
                            ElMessage.error(data.error || '登录失败');
                        }
                    } catch (error) {
                        ElMessage.error('网络错误，请重试');
                    } finally {
                        this.loading = false;
                    }
                }
            }
        }).use(ElementPlus).mount('#app');
    </script>
</body>
</html>
{% endraw %}
